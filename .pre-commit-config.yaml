# Static-analysis hooks for this repo (R + shell + Docker + GitHub Actions).
# Run in CI by .github/workflows/lint.yaml, and installed in the devcontainer by
# .devcontainer/postCreate.sh (`pre-commit install`), so the same hooks fire at
# `git commit` locally. To run by hand: `pre-commit run --all-files`.
#
# These are the BLOCKING hooks (a red here fails the lint gate): actionlint,
# hadolint, gitleaks, and shellcheck (shellcheck was promoted from advisory once
# the repo was clean at the default severity). R lintr stays advisory — it runs
# as a separate non-blocking job in lint.yaml until its findings are triaged.
minimum_pre_commit_version: "3.0.0"
exclude: '^vendor/'   # submodules carry upstream code we don't lint
repos:
  # GitHub Actions workflow linter: type-checks ${{ }} expressions, job/step
  # schema, runner labels. Would have caught the dead `branches: [fvs-container-
  # build]` trigger we shipped earlier.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # Dockerfile linter (config in .hadolint.yaml). Pinned.
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        files: (^|/)Dockerfile$

  # Secret scanner — blocks accidental credential commits.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Shell linter (promoted from advisory; the repo is already clean at the
  # default severity, so the gate just locks that in). pip-installed wrapper
  # so the pre-commit env owns the binary -- no system shellcheck required.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Don't lint *.sbatch (SLURM array directives, not a portable shell):
        # the files declare bash but shellcheck SC1091 etc. would noise.
        exclude: '\.sbatch$'
