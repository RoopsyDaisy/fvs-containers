name: Lint

# Static-analysis gate, separate from the heavy image build in ci.yaml. Runs
# natively (no Docker), so it's fast. Two jobs:
#   - lint     BLOCKING: actionlint + hadolint + gitleaks + shellcheck (via pre-commit)
#   - advisory NON-BLOCKING: R lintr — informational until findings are triaged,
#              then promoted into the blocking set (shellcheck already was).
on:
  push:
    branches-ignore: [main]   # main is post-merge; gate happens on the PR/branch
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    # NOTE: kept the original job name so any branch-protection "required
    # status check" set against it still matches. The hook list now includes
    # shellcheck too -- see the header comment above and .pre-commit-config.yaml.
    name: pre-commit (actionlint, hadolint, gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks scans history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  advisory:
    name: lintr (advisory, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true       # informational: never fails the gate
    steps:
      - uses: actions/checkout@v4

      - name: R lintr (all tracked *.R outside vendor/)
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends r-base-core
          Rscript -e 'install.packages("lintr", repos="https://cloud.r-project.org")' || exit 0
          Rscript -e '
            files <- system2("git", c("ls-files", "*.R", ":!:vendor/**"), stdout = TRUE)
            for (f in files) { cat("==", f, "==\n"); print(lintr::lint(f)) }
          ' || true
