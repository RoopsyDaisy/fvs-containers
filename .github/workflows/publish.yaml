name: Publish images (GHCR)

# Build the deliverable images and publish them to GHCR. Runs on pushes to main
# and on v* tags (and manual dispatch). Each run overwrites the moving `:ie` and
# `:latest` tags on the two packages -- it does NOT create a new package per push;
# the previous image digest just becomes untagged. Images land at:
#        ghcr.io/roopsydaisy/fvs-containers-webgui:{ie,latest}
#        ghcr.io/roopsydaisy/fvs-containers-engine:{ie,latest}
# and become `apptainer pull docker://ghcr.io/...`-able for Hellgate.
#
# NOTE: GHCR also runs ci.yaml on main pushes (build + smoke, no publish). The two
# overlap on main; that's intentional belt-and-suspenders for now -- collapse them
# if the duplicate build time matters.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:           # mirror ci.yaml — never publish on a docs-only push
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:        # allow a manual one-off publish from the Actions tab

permissions:
  contents: read
  packages: write           # required to push to GHCR

env:
  # Shared GHCR package prefix; the build appends -webgui / -engine. Lowercase
  # (GHCR requires it). Update this if the repo is ever renamed again.
  REGISTRY_IMAGE: ghcr.io/roopsydaisy/fvs-containers
  FVS_VARIANT: ie
  FVS_BASE: source

jobs:
  publish:
    name: Build + push webgui and engine images
    runs-on: ubuntu-latest
    steps:
      - name: Guard — refuse to publish to the placeholder namespace
        run: |
          case "${REGISTRY_IMAGE}" in
            *REPLACE_ON_RENAME*)
              echo "::error::REGISTRY_IMAGE is still the placeholder. Set it to the post-rename ghcr.io/<owner>/<new-repo> before publishing." ;
              exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          submodules: recursive   # vendor/fvs (+NVEL), fvs-build, fvs-interface

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + smoke test images
        run: bash scripts/build_images.sh
        env:
          ENGINE: docker
          FVS_VARIANT: ${{ env.FVS_VARIANT }}
          FVS_BASE: ${{ env.FVS_BASE }}

      - name: Tag + push to GHCR
        run: |
          set -euo pipefail
          # build_images.sh tags local images fvs-webgui:<variant> / fvs-engine:<variant>.
          for img in webgui engine; do
            local_tag="fvs-${img}:${FVS_VARIANT}"
            remote="${REGISTRY_IMAGE}-${img}"
            docker tag "${local_tag}" "${remote}:${FVS_VARIANT}"
            docker tag "${local_tag}" "${remote}:latest"
            docker push "${remote}:${FVS_VARIANT}"
            docker push "${remote}:latest"
            echo ">>> pushed ${remote}:{${FVS_VARIANT},latest}"
          done
